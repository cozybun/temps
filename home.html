<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --brand-blue: #4169E1;
      --blue-dark: #3556CA;
      --text: #000000;
      --ok: #15803d;
      --bad: #b91c1c;
      --subtle: #64748b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      padding: 1rem;
    }
    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 1rem;
    }

    .restore-wrap, .account-wrap {
      margin-top: 1.5rem;
    }

    #restore-btn {
      background: var(--brand-blue);
      color: #fff;
      border: 0;
      border-radius: 10px;
      padding: 0.85rem 1.2rem;
      font-size: 1.2rem;
      display: block;
      margin: 0 auto;
      width: min(92vw, 240px);
      max-width: 220px;
      text-align: center;
      cursor: pointer;
    }
    #restore-btn:hover { background: var(--blue-dark); }

    #restore-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.45);
      z-index: 9999;
    }
    #restore-panel {
      width: min(92vw, 420px);
      background: #fff;
      border: 1px solid #dbeafe;
      border-radius: 10px;
      padding: 0.9rem;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.2);
    }

    .row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .row input {
      flex: 1;
      min-width: 220px;
      padding: 0.75rem;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      font-size: 1rem;
    }
    .row button {
      padding: 0.75rem 1rem;
      border: 0;
      border-radius: 8px;
      background: #111827;
      color: #fff;
      cursor: pointer;
    }

    #restore-status,
    #account-status {
      margin-top: 0.75rem;
      min-height: 1.2rem;
      word-break: break-word;
    }

    .account-wrap {
      border: 1px solid #dbeafe;
      border-radius: 10px;
      padding: 0.95rem;
      background: #fff;
      display: none;
    }
    .account-wrap h3 {
      margin: 0 0 0.6rem 0;
      font-size: 1.1rem;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-top: 0.75rem;
    }
    .field label {
      font-size: 0.93rem;
      font-weight: 600;
    }
    .field input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      font-size: 1rem;
    }
    .account-actions {
      margin-top: 0.8rem;
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .help {
      font-size: 0.9rem;
      color: var(--subtle);
      margin: 0.5rem 0 0;
    }

    .ok { color: var(--ok); }
    .bad { color: var(--bad); }
    .muted { color: var(--subtle); }

    @media (max-width: 420px) {
      #restore-btn { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="restore-wrap" id="restore-wrap">
      <button id="restore-btn" type="button"> Restore My Account </button>

      <div id="restore-backdrop">
        <div id="restore-panel">
          <div class="row">
            <input id="restore-email" type="email" placeholder="you@example.com" autocomplete="email" />
            <button id="send-restore" type="button"> Send recovery link </button>
          </div>
          <div class="row" style="justify-content:flex-end; margin-top:0.6rem;">
            <button id="close-restore" type="button" style="background:#334155;"> Close </button>
          </div>
        </div>
      </div>

      <div id="restore-status" class="muted" aria-live="polite"></div>
    </div>

    <div class="account-wrap" id="account-wrap" aria-live="polite">
      <h3>Account Settings</h3>

      <div class="field">
        <label for="account-username"> Username </label>
        <input id="account-username" type="text" autocomplete="nickname" maxlength="20" placeholder="My username" />
      </div>

      <div class="field">
        <label for="account-email">Email</label>
        <input id="account-email" type="email" autocomplete="email" placeholder="me@email.com" />
      </div>

      <div class="account-actions">
        <button id="save-account" type="button" style="background:#0f172a;"> Save account </button>
      </div>

      <p id="account-status" class="muted"></p>
      <p class="help">
        If you update email, you'll get a verification link to the new email. The new email takes effect after confirmation.
      </p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ckyqknlxmjqlkqnxhgef.supabase.co';
    const SUPABASE_PUB_KEY = "sb_publishable_lQ27fzzwJf27dUWPEW8UQA_NTY7naO6";
    const client = window.__supabase_client || supabase.createClient(SUPABASE_URL, SUPABASE_PUB_KEY);
    window.__supabase_client = client;

    const CALLBACK_URL = `${window.location.origin}${window.location.pathname}`;

    const restoreWrap = document.getElementById("restore-wrap");
    const restoreBtn = document.getElementById("restore-btn");
    const restoreEmail = document.getElementById("restore-email");
    const sendRestoreBtn = document.getElementById("send-restore");
    const restoreStatus = document.getElementById("restore-status");
    const restoreBackdrop = document.getElementById("restore-backdrop");
    const closeRestoreBtn = document.getElementById("close-restore");

    const accountWrap = document.getElementById("account-wrap");
    const accountUsername = document.getElementById("account-username");
    const accountEmail = document.getElementById("account-email");
    const saveAccountBtn = document.getElementById("save-account");
    const accountStatus = document.getElementById("account-status");

    let currentUser = null;
    let originalProfile = { username: "", email: "" };

    function setStatus(el, msg, tone = "muted") {
      el.className = tone;
      el.textContent = msg || "";
    }

    function isAnonymousUser(user) {
      return Boolean(
        user?.is_anonymous ||
        user?.app_metadata?.provider === "anon" ||
        user?.app_metadata?.provider === "anonymous"
      );
    }

    function isAuthenticatedUser(user) {
      return Boolean(user?.id && user.email && !isAnonymousUser(user));
    }

    async function getCurrentSessionUser() {
      try {
        const { data, error } = await client.auth.getSession();
        if (error) {
          console.warn("Session check failed:", error.message || error);
          return null;
        }
        return data?.session?.user || null;
      } catch (e) {
        console.warn("Session check exception:", e?.message || e);
        return null;
      }
    }

    function normalizeEmail(value) {
      return String(value || "").trim().toLowerCase();
    }

    function validateUsername(username) {
      const value = String(username || "").trim();
      if (!value) return "Username is required.";
      if (value.length < 3 || value.length > 20) return "Username must be 3-20 characters";
      if (!/^[A-Za-z0-9_]+$/.test(value)) return "Username can only contain letters, numbers, and underscores";
      return "";
    }

    function validateEmail(email) {
      const value = String(email || "").trim();
      if (!value) return "Email is required";
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) return "Enter a valid email address";
      return "";
    }

    function openRestoreModal() {
      setStatus(restoreStatus, "", "muted");
      restoreBackdrop.style.display = "flex";
      restoreEmail.focus();
    }

    function closeRestoreModal() {
      restoreBackdrop.style.display = "none";
    }

    function isRecoveryRedirect() {
      return (
        window.location.hash.includes("access_token=") ||
        window.location.hash.includes("refresh_token=") ||
        window.location.search.includes("code=")
      );
    }

    async function loadAccountProfile(user) {
      const metadata = user?.user_metadata || {};
      const cachedDisplayName = metadata.display_name || metadata.username || "";

      let username = String(cachedDisplayName || "").trim();
      let email = normalizeEmail(user?.email || "");

      try {
        const { data: profileRow, error } = await client
          .from("users")
          .select("username,email")
          .eq("id", user.id)
          .maybeSingle();

        if (!error && profileRow) {
          if (profileRow.username) username = profileRow.username;
          if (profileRow.email) email = normalizeEmail(profileRow.email);
        } else if (error) {
          console.warn("Could not load profile:", error.message || error);
        }
      } catch (e) {
        console.warn("Profile lookup failed:", e?.message || e);
      }

      accountUsername.value = username;
      accountEmail.value = email;
      originalProfile = {
        username: username,
        email: email
      };
    }

    async function syncAuthStateUI() {
      const user = await getCurrentSessionUser();
      currentUser = user;

      if (isAuthenticatedUser(user)) {
        restoreWrap.style.display = "none";
        accountWrap.style.display = "block";
        await loadAccountProfile(user);
      } else {
        restoreWrap.style.display = "block";
        restoreBtn.style.display = "block";
        accountWrap.style.display = "none";
      }
    }

    async function handleRecoveryCallback() {
      if (!isRecoveryRedirect()) return false;

      const { data, error } = await client.auth.getSessionFromUrl({ storeSession: true });
      if (error) {
        setStatus(restoreStatus, "Cannot complete sign-in from your link. Please try again.", "bad");
        return true;
      }

      const user = data?.session?.user;
      if (!user) {
        setStatus(restoreStatus, "No active session found. Click the latest link again.", "bad");
        return true;
      }

      if (window.history && window.history.replaceState) {
        window.history.replaceState({}, document.title, window.location.pathname);
      }

      closeRestoreModal();
      const label = user?.user_metadata?.display_name || user?.user_metadata?.username || user.email;
      await syncAuthStateUI();
      setStatus(restoreStatus, `Welcome back, ${label || "gamer"}! Your account is restored 🎉`, "ok");
      return true;
    }

    async function handleSaveAccount() {
      if (!currentUser?.id) {
        setStatus(accountStatus, "No active user session. Please sign in again.", "bad");
        return;
      }

      const nextUsername = String(accountUsername.value || "").trim();
      const nextEmail = normalizeEmail(accountEmail.value);

      const usernameError = validateUsername(nextUsername);
      if (usernameError) {
        setStatus(accountStatus, usernameError, "bad");
        return;
      }

      const emailError = validateEmail(nextEmail);
      if (emailError) {
        setStatus(accountStatus, emailError, "bad");
        return;
      }

      const changedUsername = nextUsername !== originalProfile.username;
      const changedEmail = nextEmail !== originalProfile.email;

      if (!changedUsername && !changedEmail) {
        setStatus(accountStatus, "No changes to save.", "muted");
        return;
      }

      saveAccountBtn.disabled = true;
      setStatus(accountStatus, "Saving...", "muted");

      try {  // sync username with display_name, update email in auth if changed
        const updatePayload = {
          data: { display_name: nextUsername }
        };
        if (changedEmail) {
          updatePayload.email = nextEmail;
        }

        const { error: authErr } = await client.auth.updateUser(
          updatePayload,
          changedEmail ? { emailRedirectTo: CALLBACK_URL } : undefined
        );
        if (authErr) throw new Error(`Auth update failed: ${authErr.message}`);

        const { error: profileErr } = await client  // sync public.users.username and public.users.email
          .from("users")
          .upsert(
            {
              id: currentUser.id,
              username: nextUsername,
              email: nextEmail
            },
            { onConflict: "id" }
          );
        if (profileErr) throw new Error(`Profile update failed: ${profileErr.message}`);

        if (changedEmail) {
          setStatus(accountStatus, "Saved. Check your inbox to confirm the new email.", "ok");
        } else {
          setStatus(accountStatus, "Saved.", "ok");
        }

        await syncAuthStateUI();
      } catch (e) {
        setStatus(accountStatus, e?.message || "Could not save account details.", "bad");
      } finally {
        saveAccountBtn.disabled = false;
      }
    }

    restoreBtn.addEventListener("click", openRestoreModal);
    closeRestoreBtn.addEventListener("click", closeRestoreModal);
    restoreBackdrop.addEventListener("click", (e) => {
      if (e.target === restoreBackdrop) closeRestoreModal();
    });

    sendRestoreBtn.addEventListener("click", async () => {
      const email = normalizeEmail(restoreEmail.value);
      if (!email) {
        setStatus(restoreStatus, "Please enter your backup email:", "bad");
        return;
      }

      sendRestoreBtn.disabled = true;
      setStatus(restoreStatus, "Checking email...", "muted");

      try {  // explicitly check auth.users via RPC
        const { data: exists, error: checkErr } = await client.rpc("has_auth_email", {
          p_email: email
        });

        if (checkErr) {
          setStatus(restoreStatus, `Could not verify account: ${checkErr.message}`, "bad");
          return;
        }

        if (!exists) {
          setStatus(
            "No account found with that email. Please try another email or create a new account by saving forecasts.",
            "bad"
          );
          return;
        }

        const { error: otpErr } = await client.auth.signInWithOtp({
          email,
          options: { emailRedirectTo: CALLBACK_URL }
        });

        if (otpErr) {
          setStatus(restoreStatus, `Could not send recovery link: ${otpErr.message}`, "bad");
          return;
        }

        setStatus("Recovery link sent to email. Check your inbox (and spam).", "ok");
      } catch (e) {
        setStatus(restoreStatus, "Something went wrong. Please try again.", "bad");
      } finally {
        sendRestoreBtn.disabled = false;
      }
    });

    saveAccountBtn.addEventListener("click", handleSaveAccount);

    document.addEventListener("DOMContentLoaded", async () => {
      await handleRecoveryCallback();
      await syncAuthStateUI();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --brand-blue: #4169e1;
      --blue-dark: #3556ca;
      --text: #000000;
      --ok: #15803d;
      --bad: #b91c1c;
      --subtle: #64748b;
      --brand-green: #228B22;
      --brand-green-dark: #006400;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      padding: 1rem;
    }

    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 1rem;
    }

    .restore-wrap {
      margin-top: 1.5rem;
      display: none;
    }

    #restore-btn {
      background: var(--brand-blue);
      color: #fff;
      border: 0;
      border-radius: 10px;
      padding: 0.85rem 1.2rem;
      font-size: 1.2rem;
      font-weight: 600;
      display: block;
      margin: 0 auto;
      width: min(92vw, 240px);
      max-width: 220px;
      text-align: center;
      cursor: pointer;
    }
    #restore-btn:hover {
      background: var(--blue-dark);
    }

    #restore-backdrop,
    #account-backdrop {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.45);
      z-index: 9999;
      transition: opacity 0.18s ease;
    }

    #restore-backdrop {
      display: none;
    }

    #account-backdrop {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }

    #account-backdrop.show {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    #restore-panel,
    #account-panel {
      width: min(92vw, 420px);
      background: #fff;
      border: 1px solid #dbeafe;
      border-radius: 10px;
      padding: 0.9rem;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.2);
    }

    #account-panel {
      transform: translateY(8px);
      opacity: 0;
      transition: transform 0.2s ease, opacity 0.2s ease;
      transform-origin: top right;
    }

    #account-backdrop.show #account-panel {
      transform: translateY(0);
      opacity: 1;
    }

    .row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .row input {
      flex: 1;
      min-width: 220px;
      padding: 0.75rem;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      font-size: 1rem;
    }

    .row button {
      padding: 0.75rem 1rem;
      border: 0;
      border-radius: 8px;
      background: var(--brand-blue);
      color: #fff;
      cursor: pointer;
    }

    .row button:hover {
      background: var(--blue-dark);
    }

    #restore-status,
    #account-status {
      margin-top: 0.75rem;
      min-height: 1.2rem;
      word-break: break-word;
    }

    .account-wrap {
      border: 0;
      border-radius: 10px;
      padding: 0.95rem;
      background: #fff;
    }

    .account-wrap h3 {
      margin: 0 0 0.6rem 0;
      font-size: 1.1rem;
      text-align: center;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-top: 0.75rem;
    }

    .field label {
      font-size: 0.93rem;
      font-weight: 600;
    }

    .field input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      font-size: 1rem;
    }

    .account-actions {
      margin-top: 0.8rem;
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .account-actions button {
      color: #fff;
      font-weight: 700;
    }

    #save-account {
      background: var(--brand-blue);
      color: #fff;
      font-weight: 700;
    }

    #save-account:hover {
      background: var(--blue-dark);
    }

    #close-restore,
    #close-account-settings {
      background: #334155;
      color: #fff;
      font-weight: 700;
    }

    #close-restore:hover,
    #close-account-settings:hover {
      background: #1e293b;
    }

    #account-status {
      margin-top: 0.6rem;
    }

    /* Floating tiny gear icon */
    #open-account-settings {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10001;
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 9999px;
      background: #ffffff;
      color: #0f172a;
      font-size: 1.15rem;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.25);
      display: none;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    #open-account-settings:hover {
      transform: translateY(-1px);
      background: #f8fafc;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.3);
    }

    #open-account-settings:active {
      transform: scale(0.97);
    }

    #open-account-settings.show {
      display: inline-flex;
      animation: gearPop 0.22s ease-out;
    }

    @keyframes gearPop {
      from { transform: scale(0.92) translateY(-4px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }

    .help {
      font-size: 0.9rem;
      color: var(--subtle);
      margin: 0.5rem 0 0;
    }

    .ok { color: var(--ok); }
    .bad { color: var(--bad); }
    .muted { color: var(--subtle); }

    .music-note {
      margin: 0.6rem auto 0;
      text-align: center;
      font-size: 0.84rem;
      color: var(--subtle);
      min-height: 1.05rem;
      max-width: 420px;
      line-height: 1.35;
      word-break: break-word;
    }

    .daily-button-wrap {
      margin: 1rem auto 0.2rem;
      text-align: center;
    }

    #daily-button {
      display: block;
      margin: 0 auto;
      width: min(92vw, 240px);
      max-width: 220px;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.2rem;
      color: #fff;
      background: var(--brand-green);
      border-radius: 10px;
      padding: 0.85rem 1.2rem;
      border: 0;
      line-height: 1;
      box-shadow: 0 2px 10px rgba(16, 185, 129, 0.35);
      cursor: pointer;
    }

    #daily-button:hover {
      background: var(--brand-green-dark);
    }

    #daily-button:active {
      transform: scale(0.98);
    }

    @media (max-width: 420px) {
      #restore-btn {
        max-width: 100%;
      }
      .account-actions {
        flex-direction: column-reverse;
      }
      .account-actions button {
        width: 100%;
      }
      #open-account-settings {
        top: 10px;
        right: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="restore-wrap" id="restore-wrap">
      <button id="restore-btn" type="button"> Restore My Account </button>

      <div id="restore-backdrop">
        <div id="restore-panel">
          <div class="row">
            <input id="restore-email" type="email" placeholder="me@email.com" autocomplete="email" />
            <button id="send-restore" type="button"> Send recovery link </button>
          </div>
          <div class="row" style="justify-content:flex-end; margin-top:0.6rem;">
            <button id="close-restore" type="button"> Close </button>
          </div>
        </div>
      </div>

      <div id="restore-status" class="muted" aria-live="polite"></div>
    </div>
    
    <div class="daily-button-wrap">
      <a id="daily-button" href="daily" aria-label="Go to Daily"> Go to Daily </a>
    </div>
    
    <div class="field">
      <label for="music-volume">
        Music volume: <span id="music-volume-label"> 50% </span>
      </label>
      <input id="music-volume" type="range" min="0" max="1" step="0.25" value="0.5" />
    </div>

    <button id="start-music-btn" type="button" class="music-icon-btn" aria-label="Play background music" title="Play background music">
      🔊
    </button>
    
    <p id="music-note" class="music-note" aria-live="polite"></p>
  </div>

  <!-- Floating top-right settings gear -->
  <button
    id="open-account-settings"
    type="button"
    aria-label="Open account settings"
    title="Account Settings"
  >
    ⚙️
  </button>

  <!-- Account settings popup -->
  <div id="account-backdrop" aria-live="polite">
    <div id="account-panel" class="account-wrap" role="dialog" aria-modal="true" aria-labelledby="account-title">
      <h3 id="account-title"> Account Settings </h3>

      <div class="field">
        <label for="account-username"> Username </label>
        <input id="account-username" type="text" autocomplete="nickname" maxlength="20" placeholder="My username" />
      </div>

      <div class="field">
        <label for="account-email"> Email </label>
        <input id="account-email" type="email" autocomplete="email" placeholder="me@email.com" />
      </div>

      <div class="account-actions">
        <button id="close-account-settings" type="button"> Cancel </button>
        <button id="save-account" type="button"> Save changes </button>
      </div>

      <p id="account-status" class="muted"></p>
      <p class="help">
        If you update email, you'll get a verification link to the new email. The new email takes effect after confirmation.
      </p>
    </div>
  </div>

  <!-- Background music player (no controls visible) -->
  <audio id="bgMusic" preload="auto" aria-label="Background music"></audio>

  <script>
    const SUPABASE_URL = 'https://ckyqknlxmjqlkqnxhgef.supabase.co';
    const SUPABASE_PUB_KEY = "sb_publishable_lQ27fzzwJf27dUWPEW8UQA_NTY7naO6";
    const client = window.__supabase_client || supabase.createClient(SUPABASE_URL, SUPABASE_PUB_KEY);
    window.__supabase_client = client;

    const CALLBACK_URL = `${window.location.origin}${window.location.pathname}`;

    const restoreWrap = document.getElementById("restore-wrap");
    const restoreBtn = document.getElementById("restore-btn");
    const restoreEmail = document.getElementById("restore-email");
    const sendRestoreBtn = document.getElementById("send-restore");
    const restoreStatus = document.getElementById("restore-status");
    const restoreBackdrop = document.getElementById("restore-backdrop");
    const closeRestoreBtn = document.getElementById("close-restore");

    const settingsBtn = document.getElementById("open-account-settings");
    const accountBackdrop = document.getElementById("account-backdrop");
    const accountUsername = document.getElementById("account-username");
    const accountEmail = document.getElementById("account-email");
    const saveAccountBtn = document.getElementById("save-account");
    const accountStatus = document.getElementById("account-status");
    const closeAccountSettingsBtn = document.getElementById("close-account-settings");

    let currentUser = null;
    let originalProfile = { username: "", email: "" };

    const musicPlaylist = [  // game music soundtrack
      { title: "Sands of Time", src: "audio/11_sands_of_time.mp3" },
      { title: "Emerald Canopy", src: "audio/1_emerald_canopy.flac" },
      { title: "Frostbound Echoes", src: "audio/2_frostbound_echoes.flac" },
      { title: "Verdant Labyrinth", src: "audio/3_verdant_labyrinth.flac" },
      { title: "Abyssal Dreams", src: "audio/4_abyssal_dreams.flac" },
      { title: "Crimson Decay", src: "audio/5_crimson_decay.flac" },
      { title: "Celestial Radiance", src: "audio/6_celestial_radiance.flac" },
      { title: "Stone Whispers", src: "audio/7_stone_whispers.flac" },
      { title: "Neon Spores", src: "audio/8_neon_spores.flac" },
      { title: "Infernal Heartbeat", src: "audio/9_infernal_heartbeat.flac" },
      { title: "Apex Confrontation", src: "audio/10_apex_confrontation.mp3" }
    ];
    const bgMusic = document.getElementById("bgMusic");
    const musicNote = document.getElementById("music-note");
    let musicTrackIndex = 0;
    let musicStarted = false;

    const musicVolume = document.getElementById("music-volume");
    const musicVolumeLabel = document.getElementById("music-volume-label");

    const startMusicBtn = document.getElementById("start-music-btn");

    bgMusic.addEventListener("loadeddata", () => {
      const track = musicPlaylist[musicTrackIndex];
      musicNote.textContent = `Loaded: ${track?.title || "track"} (${track?.src || ""})`;
    });

    function startMusicAfterUserGesture() {
      if (!musicStarted) playCurrentTrack();
      if (musicStarted && startMusicBtn) startMusicBtn.style.display = "none";
    }
    
    if (startMusicBtn) {
      startMusicBtn.addEventListener("click", async () => {
        const ok = await playCurrentTrack();
        if (ok) startMusicBtn.style.display = "none";
      });
    }
    
    ["pointerdown", "touchstart", "click", "keydown"].forEach((evt) => {
      document.addEventListener(evt, startMusicAfterUserGesture, { once: true });
    });
    
    bgMusic.volume = 0.5;
    bgMusic.playsInline = true;
    
    if (musicVolume) {
      musicVolume.value = String(bgMusic.volume);
      musicVolumeLabel.textContent = `${Math.round(bgMusic.volume * 100)}%`;
    
      musicVolume.addEventListener("input", (e) => {
        const v = Number(e.target.value);
        bgMusic.volume = v;
        musicVolumeLabel.textContent = `${Math.round(v * 100)}%`;
      });
    }

    function setTrack(index) {
      if (!musicPlaylist.length) return "";
      const len = musicPlaylist.length;
      musicTrackIndex = (index % len + len) % len;

      const track = musicPlaylist[musicTrackIndex];
      bgMusic.src = track.src;
      bgMusic.loop = len === 1;
      bgMusic.load();

      const label = track.title || `Track ${musicTrackIndex + 1}`;
      if (musicNote) musicNote.textContent = `Loaded: ${label}`;
      return label;
    }
    
    async function playCurrentTrack() {
      if (!bgMusic || !bgMusic.src) return false;
    
      try {
        await bgMusic.play();
        musicStarted = true;
        if (musicNote) musicNote.textContent = "Background music playing";
        return true;
      } catch (err) {
        musicStarted = false;
        console.error("Play failed:", err);
    
        if (err.name === "NotAllowedError") {
          musicNote.textContent = "Browser blocked autoplay. Click the music button.";
        } else if (err.name === "NotSupportedError") {
          musicNote.textContent = "This track format is not supported. Skipping...";
          playNextTrack();  // try next track
        } else {
          musicNote.textContent = `Cannot play audio (${err.name})`;
        }
        return false;
      }
    }

    function playNextTrack() {
      if (musicPlaylist.length <= 1) return;
      setTrack(musicTrackIndex + 1);
      playCurrentTrack();
    }

    bgMusic.addEventListener("ended", playNextTrack);

    function setStatus(el, msg, tone = "muted") {
      el.className = tone;
      el.textContent = msg || "";
    }

    function isAnonymousUser(user) {
      return Boolean(
        user?.is_anonymous ||
        user?.app_metadata?.provider === "anon" ||
        user?.app_metadata?.provider === "anonymous"
      );
    }

    function isAuthenticatedUser(user) {
      return Boolean(user?.id && user.email && !isAnonymousUser(user));
    }

    async function getCurrentSessionUser() {
      try {
        const { data, error } = await client.auth.getSession();
        if (error) {
          console.warn("Session check failed:", error.message || error);
          return null;
        }
        return data?.session?.user || null;
      } catch (e) {
        console.warn("Session check exception:", e?.message || e);
        return null;
      }
    }

    function normalizeEmail(value) {
      return String(value || "").trim().toLowerCase();
    }

    function validateUsername(username) {
      const value = String(username || "").trim();
      if (!value) return "Username is required.";
      if (value.length < 3 || value.length > 20) return "Username must be 3-20 characters";
      if (!/^[A-Za-z0-9_]+$/.test(value)) return "Username can only contain letters, numbers, and underscores";
      return "";
    }

    function validateEmail(email) {
      const value = String(email || "").trim();
      if (!value) return "Email is required";
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) return "Enter a valid email address";
      return "";
    }

    function openRestoreModal() {
      setStatus(restoreStatus, "", "muted");
      restoreBackdrop.style.display = "flex";
      restoreEmail.focus();
    }

    function closeRestoreModal() {
      restoreBackdrop.style.display = "none";
    }

    function openAccountSettingsModal() {
      setStatus(accountStatus, "", "muted");
      accountBackdrop.classList.add("show");
      accountBackdrop.style.pointerEvents = "auto";
      requestAnimationFrame(() => {
        const panel = document.getElementById("account-panel");
        panel.style.opacity = 0;
        panel.style.transform = "translateY(8px)";
        requestAnimationFrame(() => {
          panel.style.opacity = 1;
          panel.style.transform = "translateY(0)";
        });
      });
      accountUsername.focus();
    }

    function closeAccountSettingsModal() {
      accountBackdrop.classList.remove("show");
      accountBackdrop.style.pointerEvents = "none";
      const panel = document.getElementById("account-panel");
      panel.style.opacity = 0;
      panel.style.transform = "translateY(8px)";
    }

    function isRecoveryRedirect() {
      return (
        window.location.hash.includes("access_token=") ||
        window.location.hash.includes("refresh_token=") ||
        window.location.search.includes("code=")
      );
    }

    async function loadAccountProfile(user) {
      const metadata = user?.user_metadata || {};
      const cachedDisplayName = metadata.display_name || metadata.username || "";

      let username = String(cachedDisplayName || "").trim();
      let email = normalizeEmail(user?.email || "");

      try {
        const { data: profileRow, error } = await client
          .from("users")
          .select("username,email")
          .eq("id", user.id)
          .maybeSingle();

        if (!error && profileRow) {
          if (profileRow.username) username = profileRow.username;
          if (profileRow.email) email = normalizeEmail(profileRow.email);
        } else if (error) {
          console.warn("Could not load profile:", error.message || error);
        }
      } catch (e) {
        console.warn("Profile lookup failed:", e?.message || e);
      }

      accountUsername.value = username;
      accountEmail.value = email;
      originalProfile = { username, email };
    }

    async function syncAuthStateUI() {
      const user = await getCurrentSessionUser();
      currentUser = user;
    
      if (isAuthenticatedUser(user)) {
        restoreWrap.style.display = "none";
        settingsBtn.style.display = "";
        settingsBtn.classList.add("show");
        await loadAccountProfile(user);
      } else {
        restoreWrap.style.display = "block";
        settingsBtn.classList.remove("show");
        settingsBtn.style.display = "none";
        closeAccountSettingsModal();
      }
    }

    async function handleRecoveryCallback() {
      if (!isRecoveryRedirect()) return false;

      const { data, error } = await client.auth.getSessionFromUrl({ storeSession: true });
      if (error) {
        setStatus(restoreStatus, "Cannot complete sign-in from your link. Please try again.", "bad");
        return true;
      }

      const user = data?.session?.user;
      if (!user) {
        setStatus(restoreStatus, "No active session found. Click the latest link again.", "bad");
        return true;
      }

      if (window.history && window.history.replaceState) {
        window.history.replaceState({}, document.title, window.location.pathname);
      }

      closeRestoreModal();
      const label = user?.user_metadata?.display_name || user?.user_metadata?.username || user.email;
      await syncAuthStateUI();
      setStatus(restoreStatus, `Welcome back, ${label || "gamer"}! Your account is restored 🎉`, "ok");
      return true;
    }

    async function handleSaveAccount() {
      if (!currentUser?.id) {
        setStatus(accountStatus, "No active user session. Please sign in again.", "bad");
        return;
      }

      const nextUsername = String(accountUsername.value || "").trim();
      const nextEmail = normalizeEmail(accountEmail.value);

      const usernameError = validateUsername(nextUsername);
      if (usernameError) {
        setStatus(accountStatus, usernameError, "bad");
        return;
      }

      const emailError = validateEmail(nextEmail);
      if (emailError) {
        setStatus(accountStatus, emailError, "bad");
        return;
      }

      const changedUsername = nextUsername !== originalProfile.username;
      const changedEmail = nextEmail !== originalProfile.email;

      if (!changedUsername && !changedEmail) {
        setStatus(accountStatus, "No changes to save", "muted");
        return;
      }

      saveAccountBtn.disabled = true;
      setStatus(accountStatus, "Saving...", "muted");

      try {
        const updatePayload = { data: { display_name: nextUsername } };
        if (changedEmail) updatePayload.email = nextEmail;

        const { error: authErr } = await client.auth.updateUser(
          updatePayload,
          changedEmail ? { emailRedirectTo: CALLBACK_URL } : undefined
        );
        if (authErr) throw new Error(`Auth update failed: ${authErr.message}`);

        const { error: profileErr } = await client
          .from("users")
          .upsert(
            { id: currentUser.id, username: nextUsername, email: nextEmail },
            { onConflict: "id" }
          );
        if (profileErr) throw new Error(`Profile update failed: ${profileErr.message}`);

        if (changedEmail) {
          setStatus(accountStatus, "Saved. Check your inbox to confirm the new email.", "ok");
        } else {
          setStatus(accountStatus, "Saved.", "ok");
        }

        await syncAuthStateUI();
      } catch (e) {
        setStatus(accountStatus, e?.message || "Could not save account details.", "bad");
      } finally {
        saveAccountBtn.disabled = false;
      }
    }

    restoreBtn.addEventListener("click", openRestoreModal);
    closeRestoreBtn.addEventListener("click", closeRestoreModal);
    restoreBackdrop.addEventListener("click", (e) => {
      if (e.target === restoreBackdrop) closeRestoreModal();
    });

    settingsBtn.addEventListener("click", async () => {
      await loadAccountProfile(currentUser);
      openAccountSettingsModal();
    });

    closeAccountSettingsBtn.addEventListener("click", closeAccountSettingsModal);
    accountBackdrop.addEventListener("click", (e) => {
      if (e.target === accountBackdrop) closeAccountSettingsModal();
    });

    sendRestoreBtn.addEventListener("click", async () => {
      const email = normalizeEmail(restoreEmail.value);
      if (!email) {
        setStatus(restoreStatus, "Please enter your backup email.", "bad");
        return;
      }

      sendRestoreBtn.disabled = true;
      setStatus(restoreStatus, "Checking email...", "muted");

      try {
        const { data: exists, error: checkErr } = await client.rpc("has_auth_email", { p_email: email });

        if (checkErr) {
          setStatus(restoreStatus, `Could not verify account: ${checkErr.message}`, "bad");
          return;
        }

        if (!exists) {
          setStatus(
            restoreStatus,
            "No account found with that email. Please try another email or create a new account by saving forecasts.",
            "bad"
          );
          return;
        }

        const { error: otpErr } = await client.auth.signInWithOtp({
          email,
          options: { emailRedirectTo: CALLBACK_URL }
        });

        if (otpErr) {
          setStatus(restoreStatus, `Could not send recovery link: ${otpErr.message}`, "bad");
          return;
        }

        setStatus(restoreStatus, "Recovery link sent to email. Check your inbox (and spam).", "ok");
      } catch (e) {
        setStatus(restoreStatus, "Something went wrong. Please try again.", "bad");
      } finally {
        sendRestoreBtn.disabled = false;
      }
    });

    saveAccountBtn.addEventListener("click", handleSaveAccount);

    document.addEventListener("DOMContentLoaded", async () => {  // init auto music playback on load
      accountBackdrop.style.pointerEvents = "none";

      if (musicPlaylist.length > 0) {
        const first = setTrack(0);
        if (musicNote && first) musicNote.textContent = `Loaded: ${first}`;
        playCurrentTrack();
      } else {
        if (musicNote) musicNote.textContent = "No music tracks configured";
      }

      await handleRecoveryCallback();
      await syncAuthStateUI();
    });

    function startMusicAfterUserGesture() {  // autoplay fallback, user click starts music if blocked
      if (!musicStarted) playCurrentTrack();  
    }
    document.addEventListener("pointerdown", startMusicAfterUserGesture, { once: true });
    document.addEventListener("keydown", startMusicAfterUserGesture, { once: true });
  </script>
</body>
</html>

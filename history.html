<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forecast History</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #3b82f6;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px 12px;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #f8fbff, var(--bg));
      color: var(--text);
      display: flex;
      justify-content: center;
    }

    .wrap {
      width: min(1180px, 100%);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .title {
      margin: 0;
      text-align: center;
      font-size: 1.7rem;
      font-weight: 750;
      letter-spacing: -0.01em;
      color: #111827;
    }

    .subtitle {
      margin: 6px 0 0;
      text-align: center;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.98rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .status {
      border-left: 4px solid var(--accent);
      background: #eff6ff;
      color: #1d4ed8;
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 12px;
      font-weight: 600;
      text-align: center;
      line-height: 1.45;
    }

    .status.error {
      background: #fef2f2;
      border-left-color: #ef4444;
      color: #991b1b;
    }

    .status.loading {
      background: #f9fafb;
      border-left-color: #64748b;
      color: #334155;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(6, minmax(150px, 1fr));
      gap: 10px;
      align-items: end;
      margin-bottom: 12px;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .control label {
      font-size: 0.8rem;
      color: #374151;
      font-weight: 600;
    }

    input[type="text"], input[type="date"], select {
      width: 100%;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #111827;
      border-radius: 10px;
      padding: 10px 11px;
      font-size: 0.94rem;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .button {
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      font-weight: 600;
      cursor: pointer;
      padding: 10px 14px;
      font-size: 0.95rem;
      line-height: 1;
      white-space: nowrap;
    }

    .button:hover { filter: brightness(1.03); }

    .button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .button.ghost {
      background: #f3f4f6;
      color: #111827;
      border: 1px solid #d1d5db;
    }

    .button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.2);
    }

    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .table-scroll {
      overflow-x: auto;
      width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 860px;
    }

    thead th {
      background: #f8fafc;
      text-align: left;
      font-size: 0.82rem;
      color: #334155;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      white-space: nowrap;
      position: relative;
      transition: background-color 0.2s ease;
    }

    th[data-sort] {
      cursor: pointer;
      user-select: none;
    }

    th[data-sort]:hover {
      background: #f1f5f9;
    }

    th[data-sort].active-sort {
      color: #1d4ed8;
      background: #eef7ff;
    }

    th[data-sort].active-sort::after {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 0;
      height: 2px;
      background: var(--accent);
      border-radius: 9999px;
      pointer-events: none;
    }

    th .sort-arrow {
      display: inline-block;
      width: 0.8rem;
      font-size: 0.72rem;
      margin-left: 6px;
      color: #64748b;
    }

    tbody td {
      padding: 11px 12px;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: top;
      font-size: 0.94rem;
      color: #1f2937;
    }

    tbody tr:hover td {
      background: #f9fafb;
    }

    .muted { color: #6b7280; }

    .empty {
      text-align: center;
      color: #6b7280;
      padding: 20px 12px;
      font-size: 0.95rem;
      background: #fafafa;
    }

    .pager {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .pager-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .footer-row {
      margin-top: 12px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    @media (max-width: 960px) {
      .controls {
        grid-template-columns: repeat(2, minmax(150px, 1fr));
      }
      .title {
        font-size: 1.45rem;
      }
    }

    @media (max-width: 560px) {
      .controls {
        grid-template-columns: 1fr;
      }
      .pager {
        justify-content: center;
        text-align: center;
      }
      .footer-row { justify-content: stretch; }
      .footer-row .button { width: 100%; }
      .btn-group { width: 100%; }
      .btn-group .button { flex: 1; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1 class="title">📖 My Forecast History</h1>
      <p class="subtitle">Filter, search, sort by clicking headers, and paginate forecasts from <strong>My Hourly Scores</strong>.</p>
    </header>

    <section class="card">
      <div id="status" class="status loading">Loading my forecast history…</div>

      <div class="controls">
        <div class="control">
          <label for="searchInput">Search</label>
          <input id="searchInput" type="text" placeholder="City or date…" />
        </div>

        <div class="control">
          <label for="cityFilter">City</label>
          <select id="cityFilter">
            <option value="">All cities</option>
          </select>
        </div>

        <div class="control">
          <label for="fromDate">From date</label>
          <input id="fromDate" type="date" />
        </div>

        <div class="control">
          <label for="toDate">To date</label>
          <input id="toDate" type="date" />
        </div>

        <div class="control">
          <label for="pageSize">Rows / page</label>
          <select id="pageSize">
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="150">150</option>
          </select>
        </div>

        <div class="control">
          <label>&nbsp;</label>
          <div class="btn-group">
            <button id="clearBtn" class="button ghost" type="button">Clear Filters</button>
            <button id="refreshBtn" class="button secondary" type="button">Refresh</button>
          </div>
        </div>
      </div>

      <div class="table-wrap">
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th data-sort="date" data-label="Date">Date <span class="sort-arrow"></span></th>
                <th data-sort="hour" data-label="Hr">Hr <span class="sort-arrow"></span></th>
                <th data-sort="city" data-label="City">City <span class="sort-arrow"></span></th>
                <th data-sort="forecast" data-label="Forecast">Forecast <span class="sort-arrow"></span></th>
                <th data-sort="actual" data-label="Actual">Actual <span class="sort-arrow"></span></th>
                <th data-sort="accuracy" data-label="Accuracy (Error)">Accuracy (Error) <span class="sort-arrow"></span></th>
                <th data-sort="coins" data-label="Coins">Coins <span class="sort-arrow"></span></th>
              </tr>
            </thead>
            <tbody id="historyBody"></tbody>
          </table>
        </div>
      </div>

      <div class="pager">
        <span id="pagerInfo" class="meta">0 of 0 entries</span>
        <div class="pager-actions">
          <button id="prevPage" class="button secondary" type="button">Previous</button>
          <button id="nextPage" class="button secondary" type="button">Next</button>
        </div>
      </div>

      <div class="footer-row">
        <button id="statsBtn" class="button" type="button">Go To My Stats</button>
      </div>
    </section>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://ckyqknlxmjqlkqnxhgef.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNreXFrbmx4bWpxbGtxbnhoZ2VmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ5MDEwNjksImV4cCI6MjA4MDQ3NzA2OX0.KPzrKD3TW1CubAQhHyo5oJV0xQ_GLxBG96FSDfTN6p0";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const statusEl = document.getElementById("status");

    const searchInput = document.getElementById("searchInput");
    const cityFilter = document.getElementById("cityFilter");
    const fromDateInput = document.getElementById("fromDate");
    const toDateInput = document.getElementById("toDate");
    const pageSizeInput = document.getElementById("pageSize");
    const clearBtn = document.getElementById("clearBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const statsBtn = document.getElementById("statsBtn");

    const prevPageBtn = document.getElementById("prevPage");
    const nextPageBtn = document.getElementById("nextPage");
    const pagerInfo = document.getElementById("pagerInfo");

    const tbody = document.getElementById("historyBody");
    const tableHeaders = document.querySelectorAll("th[data-sort]");

    const defaultSortDirection = {
      date: "desc",
      hour: "desc",
      city: "asc",
      forecast: "desc",
      actual: "desc",
      accuracy: "desc",
      coins: "desc"
    };

    const state = {
      rows: [],
      filteredRows: [],
      sortBy: "date",
      sortDir: "desc",
      page: 1,
      pageSize: 50,
    };

    function getUserId() {
      const qs = new URLSearchParams(location.search).get("user_id");
      if (qs && qs.trim()) {
        localStorage.setItem("temps_user_id", qs.trim());
        return qs.trim();
      }
      const legacy = localStorage.getItem("user_id");
      const stored = localStorage.getItem("temps_user_id");
      if (stored && stored.trim()) return stored.trim();
      if (legacy && legacy.trim()) {
        localStorage.setItem("temps_user_id", legacy.trim());
        return legacy.trim();
      }
      return null;
    }

    function safeNumber(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }

    function resolveValue(row, keys) {
      for (const k of keys) {
        if (Object.prototype.hasOwnProperty.call(row, k)) {
          const v = row[k];
          if (v !== null && v !== undefined && v !== "") return v;
        }
      }
      return null;
    }

    function fmtIntOrDecimal(v, fallback = "—") {
      if (v === null || v === undefined || v === "") return fallback;
      const n = Number(v);
      if (Number.isNaN(n) || !Number.isFinite(n)) return fallback;
      if (Number.isInteger(n)) {
        return Math.trunc(n).toLocaleString();
      }
      return n.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 });
    }

    function fmtDate(raw) {
      if (!raw) return "—";
      const d = new Date(raw);
      if (Number.isNaN(d.getTime())) return String(raw);
      return d.toLocaleDateString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function parseDate(raw) {
      const t = Date.parse(raw);
      return Number.isNaN(t) ? 0 : t;
    }

    function toDateObj(raw) {
      const d = new Date(raw);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function hourFromRow(row) {
      const direct = resolveValue(row, ["hour", "hr", "hour_of_day", "forecast_hour"]);
      if (direct !== null) {
        const h = Number(direct);
        if (Number.isFinite(h)) {
          return ((h % 24) + 24) % 24;
        }
      }

      const d = toDateObj(resolveValue(row, ["date", "created_at", "forecast_at", "timestamp", "createdAt"]));
      if (!d) return null;
      return d.getHours();
    }

    function formatHourLabel(hour, rowDate) {
      const h = Number(hour);
      if (Number.isFinite(h)) return String(Math.trunc(((h % 24) + 24) % 24)).padStart(2, "0");
      const d = toDateObj(rowDate);
      if (!d) return "—";
      return String(d.getHours()).padStart(2, "0");
    }

    function buildCityOptions(rows) {
      const seen = new Map();
      rows.forEach(r => {
        if (r.city_key && !seen.has(r.city_key)) {
          seen.set(r.city_key, r.city_name || "Unknown city");
        }
      });
      const arr = [...seen.entries()].sort((a, b) => a[1].localeCompare(b[1]));
      cityFilter.innerHTML = '<option value="">All cities</option>';
      arr.forEach(([key, name]) => {
        const opt = document.createElement("option");
        opt.value = key;
        opt.textContent = name;
        cityFilter.appendChild(opt);
      });
    }

    function updateSortIndicators() {
      tableHeaders.forEach(th => {
        const isSorted = th.dataset.sort === state.sortBy;
        th.classList.toggle("active-sort", isSorted);

        const label = th.dataset.label || th.textContent.replace("▲", "").replace("▼", "").trim();
        th.innerHTML = `${label} <span class="sort-arrow">${isSorted ? (state.sortDir === "asc" ? "▲" : "▼") : ""}</span>`;
      });
    }

    function getValueForSort(row, key) {
      if (key === "forecast") return safeNumber(row.forecast_value);
      if (key === "actual") return safeNumber(row.actual_value);
      if (key === "accuracy") return safeNumber(row.error_value);
      if (key === "coins") return safeNumber(row.coins);
      return 0;
    }

    function applyFiltersAndSort() {
      const search = searchInput.value.trim().toLowerCase();
      const cityValue = cityFilter.value;
      const sortBy = state.sortBy;
      const from = fromDateInput.value ? Date.parse(fromDateInput.value) : null;
      const toRaw = toDateInput.value ? Date.parse(toDateInput.value) : null;
      const to = Number.isFinite(toRaw) ? (toRaw + 24 * 60 * 60 * 1000 - 1) : null;

      let rows = state.rows.filter(row => {
        if (cityValue && row.city_key !== cityValue) return false;

        const rowDate = row.date || "";
        const dateNum = parseDate(rowDate);
        if (search) {
          const searchable =
            `${row.city_name || ""} ${row.date || ""} ${formatHourLabel(row.hour, rowDate)} ${fmtDate(rowDate)}`.toLowerCase();
          if (!searchable.includes(search)) return false;
        }

        if (from !== null && dateNum !== 0 && dateNum < from) return false;
        if (to !== null && dateNum !== 0 && dateNum > to) return false;

        return true;
      });

      rows.sort((a, b) => {
        let cmp = 0;

        if (sortBy === "date") {
          cmp = parseDate(a.date) - parseDate(b.date);
          if (cmp === 0) cmp = (a.hour || 0) - (b.hour || 0);
          if (cmp === 0) cmp = safeNumber(a.id) - safeNumber(b.id);
        } else if (sortBy === "hour") {
          cmp = (a.hour || -1) - (b.hour || -1);
          if (cmp === 0) {
            cmp = parseDate(a.date) - parseDate(b.date);
            if (cmp === 0) cmp = safeNumber(a.id) - safeNumber(b.id);
          }
        } else if (sortBy === "city") {
          cmp = (a.city_name || "Unknown city").localeCompare(b.city_name || "Unknown city");
          if (cmp === 0) {
            cmp = parseDate(a.date) - parseDate(b.date);
            if (cmp === 0) cmp = (a.hour || 0) - (b.hour || 0);
            if (cmp === 0) cmp = safeNumber(a.id) - safeNumber(b.id);
          }
        } else if (sortBy === "forecast" || sortBy === "actual" || sortBy === "accuracy" || sortBy === "coins") {
          cmp = getValueForSort(a, sortBy) - getValueForSort(b, sortBy);
          if (cmp === 0) {
            cmp = parseDate(a.date) - parseDate(b.date);
            if (cmp === 0) cmp = (a.hour || 0) - (b.hour || 0);
            if (cmp === 0) cmp = safeNumber(a.id) - safeNumber(b.id);
          }
        }

        return state.sortDir === "asc" ? cmp : -cmp;
      });

      state.filteredRows = rows;
      state.page = 1;
      renderCurrentPage();
      renderStatus();
      updateSortIndicators();
    }

    function renderCurrentPage() {
      state.pageSize = Math.max(1, Number(pageSizeInput.value) || 50);

      const total = state.filteredRows.length;
      const totalPages = Math.max(1, Math.ceil(total / state.pageSize));
      state.page = Math.min(Math.max(1, state.page), totalPages);

      const start = (state.page - 1) * state.pageSize;
      const end = Math.min(start + state.pageSize, total);
      const visibleRows = state.filteredRows.slice(start, end);

      tbody.innerHTML = "";

      if (!visibleRows.length) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.className = "empty";
        td.colSpan = 7;
        td.textContent = total === 0 ? "No records found." : "No records on this page.";
        tr.appendChild(td);
        tbody.appendChild(tr);
      } else {
        for (const row of visibleRows) {
          const tr = document.createElement("tr");

          const tdDate = document.createElement("td");
          tdDate.textContent = fmtDate(row.date);

          const tdHour = document.createElement("td");
          tdHour.textContent = formatHourLabel(row.hour, row.date);

          const tdCity = document.createElement("td");
          tdCity.textContent = row.city_name || "Unknown city";

          const tdForecast = document.createElement("td");
          tdForecast.textContent = fmtIntOrDecimal(row.forecast_value, "—");

          const tdActual = document.createElement("td");
          tdActual.textContent = fmtIntOrDecimal(row.actual_value, "—");

          const tdErrors = document.createElement("td");
          tdErrors.textContent = fmtIntOrDecimal(row.error_value, "—");

          const tdCoins = document.createElement("td");
          tdCoins.textContent = fmtIntOrDecimal(row.coins, "—");

          tr.appendChild(tdDate);
          tr.appendChild(tdHour);
          tr.appendChild(tdCity);
          tr.appendChild(tdForecast);
          tr.appendChild(tdActual);
          tr.appendChild(tdErrors);
          tr.appendChild(tdCoins);
          tbody.appendChild(tr);
        }
      }

      pagerInfo.textContent = total === 0
        ? "No entries to display."
        : `Showing ${start + 1}-${end} of ${total} entries • Page ${state.page} of ${totalPages}`;

      prevPageBtn.disabled = state.page <= 1;
      nextPageBtn.disabled = state.page >= totalPages;
    }

    function renderStatus() {
      if (state.rows.length === 0) {
        statusEl.className = "status";
        statusEl.textContent = "No forecast entries found for this user yet.";
        return;
      }

      statusEl.className = "status";
      statusEl.textContent = `Loaded ${state.rows.length} total record${state.rows.length === 1 ? "" : "s"} from My Hourly Scores.`;

      if (state.filteredRows.length === 0) {
        statusEl.className = "status error";
        statusEl.textContent = "No entries match your current filters.";
      }
    }

    async function loadCityNames(cityIds) {
      if (!cityIds.length) return new Map();

      const { data, error } = await supabase
        .from("cities")
        .select("id, name")
        .in("id", cityIds);

      if (error || !Array.isArray(data)) return new Map();

      const map = new Map();
      data.forEach(c => map.set(String(c.id), c.name || `City ${c.id}`));
      return map;
    }

    async function loadHistory() {
      statusEl.className = "status loading";
      statusEl.textContent = "Loading my forecast history…";
      tbody.innerHTML = "";
      cityFilter.innerHTML = '<option value="">All cities</option>';

      try {
        const userId = getUserId();
        if (!userId) {
          statusEl.className = "status error";
          statusEl.textContent = "No user ID found. Open this page from the session that created the forecasts.";
          return;
        }

        const { data, error } = await supabase
          .from("score_forecasts")
          .select("*")
          .eq("user_id", userId)
          .order("id", { ascending: false });

        if (error) throw error;

        const rows = Array.isArray(data) ? data : [];
        const cityIds = [...new Set(rows.map(r => r.city_id).filter(v => v !== null && v !== undefined))];
        const cityMap = await loadCityNames(cityIds);

        state.rows = rows.map(r => {
          const cityKey = r.city_id == null ? "__unknown__" : String(r.city_id);
          return {
            ...r,
            date: resolveValue(r, ["date", "created_at", "forecast_at", "timestamp", "createdAt"]) || "",
            hour: hourFromRow(r),
            city_key: cityKey,
            city_name: cityMap.get(cityKey) || (r.city_id == null ? "Unknown city" : `City ${r.city_id}`),
            forecast_value: resolveValue(r, [
              "forecast", "forecast_temp", "temp_forecast", "forecast_value",
              "predicted_temp", "predicted", "forecast_high", "forecast_low"
            ]),
            actual_value: resolveValue(r, [
              "actual", "actual_temp", "temp_actual", "actual_value",
              "actual_high", "actual_low"
            ]),
            error_value: resolveValue(r, [
              "error", "error_temp", "temp_error", "accuracy_error", "error_high", "error_low"
            ])
          };
        });

        buildCityOptions(state.rows);
        state.sortBy = "date";
        state.sortDir = "desc";
        updateSortIndicators();
        applyFiltersAndSort();
      } catch (error) {
        statusEl.className = "status error";
        statusEl.textContent = `Could not load history: ${error.message || String(error)}`;
      }
    }

    function wireEvents() {
      searchInput.addEventListener("input", () => {
        state.page = 1;
        applyFiltersAndSort();
      });

      cityFilter.addEventListener("change", () => {
        state.page = 1;
        applyFiltersAndSort();
      });

      fromDateInput.addEventListener("change", () => {
        state.page = 1;
        applyFiltersAndSort();
      });

      toDateInput.addEventListener("change", () => {
        state.page = 1;
        applyFiltersAndSort();
      });

      pageSizeInput.addEventListener("change", () => {
        state.page = 1;
        renderCurrentPage();
      });

      clearBtn.addEventListener("click", () => {
        searchInput.value = "";
        cityFilter.value = "";
        fromDateInput.value = "";
        toDateInput.value = "";
        pageSizeInput.value = "50";
        state.page = 1;
        state.pageSize = 50;
        applyFiltersAndSort();
      });

      refreshBtn.addEventListener("click", loadHistory);

      prevPageBtn.addEventListener("click", () => {
        state.page = Math.max(1, state.page - 1);
        renderCurrentPage();
      });

      nextPageBtn.addEventListener("click", () => {
        state.page += 1;
        renderCurrentPage();
      });

      statsBtn.addEventListener("click", () => {
        window.location.href = "stats.html";
      });

      tableHeaders.forEach(th => {
        th.addEventListener("click", () => {
          const sortKey = th.dataset.sort;
          if (!sortKey) return;

          if (state.sortBy === sortKey) {
            state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
          } else {
            state.sortBy = sortKey;
            state.sortDir = defaultSortDirection[sortKey] || "desc";
          }

          state.page = 1;
          applyFiltersAndSort();
        });
      });
    }

    wireEvents();
    loadHistory();
  </script>
</body>
</html>

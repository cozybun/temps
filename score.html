<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Score</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      max-width: 500px;
      margin: auto;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    #scoreList {
      display: flex;
      justify-content: flex-start;
      gap: 12px;
      flex-wrap: nowrap;
      overflow-x: auto;
    }

    .score-row {
      flex: 1;
      min-width: 140px;
      opacity: 0;
      transform: scale(0.9) translateY(8px);
      transition: 0.45s ease;
      border-bottom: none;
      padding: 12px;
    }

    .score-row.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .city {
      font-size: 20px;
      font-weight: 600;
    }

    .msg {
      font-size: 14px;
      margin-top: 4px;
    }

    .detail {
      font-size: 18px;
      margin-top: 6px;
      line-height: 1.5;
    }

    .coin {
      margin-top: 6px;
      font-weight: 600;
    }

    .mood {
      margin-top: 6px;
      font-weight: 600;
    }

    .missing {
      opacity: 0.75;
    }

    #total {
      margin-top: 16px;
      font-size: 20px;
      font-weight: bold;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #stats {
      margin-top: 16px;
      font-size: 20px;
      ont-weight: bold;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    button {
      padding: 10px 16px;
      margin-top: 14px;
      font-size: 14px;
      cursor: pointer;
    }

    @media (max-width: 500px) {
      body {
        padding: 14px 12px;
      }

      .city {
        font-size: 18px;
      }

      #total {
        font-size: 18px;
      }

      .detail {
        font-size: 15px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <a href="index.html">
    <button>← Back</button>
  </a>

  <h1> My Score </h1>

  <div id="scoreList"></div>

  <div id="total">🪙 <span id="coinTotal">0</span></div>

  <div id="stats">
    <div class="stat-item">💗 <span id="moodTotal">0</span></div>
    <div class="stat-item">⭐ <span id="streakTotal">0</span></div>
  </div>

  <button id="shareBtn"> Share </button>

  <script>
    const SUPABASE_URL = "https://ckyqknlxmjqlkqnxhgef.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhbmFzZSIsInJlZiI6ImNreXFrbmx4bWpxbGtxbnhoZ2VmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ5MDEwNjksImV4cCI6MjA4MDQ3NzA2OX0.KPzrKD3TW1CubAQhHyo5oJV0xQ_GLxBG96FSDfTN6p0";

    const { createClient } = supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const userId = localStorage.getItem("temps_user_id");
    const ydayDate = new Date(Date.now() - 86400000).toISOString().split("T")[0];

    const CITY_BY_ID = {
      1: "Los Angeles",
      2: "Austin",
      3: "New York City"
    };

    let totalCoins = 0;
    let streak = 0;
    let totalMood = 0;

    function animateNumber(elementId, target, duration = 600) {
      const el = document.getElementById(elementId);
      const startTime = performance.now();
      const end = Number(target) || 0;

      function update(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const value = end >= 0
          ? Math.floor(progress * end)
          : -Math.floor(progress * Math.abs(end));

        el.textContent = value;

        if (progress < 1) {
          requestAnimationFrame(update);
        } else {
          el.textContent = end;
          el.style.transform = "scale(1.2)";
          setTimeout(() => (el.style.transform = "scale(1)"), 125);
        }
      }

      requestAnimationFrame(update);
    }

    function formatTemp(v) {
      if (v === null || v === undefined || v === "" || Number.isNaN(Number(v))) {
        return "—";
      }
      return `${Math.abs(Math.round(Number(v)))}`;
    }

    function formatMood(v) {
      if (v === null || v === undefined || v === "" || Number.isNaN(Number(v))) {
        return "—";
      }
      return `${Math.round(Number(v))}`;
    }

    function cityDisplay(row) {
      if (row.city && String(row.city).trim()) return String(row.city).trim();
      if (row.city_id !== null && row.city_id !== undefined) {
        return CITY_BY_ID[row.city_id] || CITY_BY_ID[String(row.city_id)] || `City ${row.city_id}`;
      }
      return "Unknown City";
    }

    function hasForecast(row) {
      return row.forecast_high != null && row.forecast_low != null;
    }

    function resultCircle(row) {
      if (!hasForecast(row)) return "⚪";

      const error_high = Number(row.error_high);

      if (error_high <= 1) return "🟢";
      if (error_high <= 3) return "🟡";
      return "🔴";
    }

    async function loadScore() {
      console.log("User ID:", userId);
      console.log("Yesterday's Date:", ydayDate);

      if (!userId) {
        document.getElementById("scoreList").innerHTML = "<p>No user found. Please make a forecast.</p>";
        return;
      }

      const { data: scores, error: scoreError } = await client
        .from("daily_scores")
        .select("*")
        .eq("user_id", userId)
        .eq("date", ydayDate)
        .order("city_id");

      if (scoreError) {
        console.error("Score Fetch Error:", scoreError);
        document.getElementById("scoreList").innerHTML = "<p>Could not load scores.</p>";
        return;
      }

      // keep only streak from user_stats
      let { data: userStats, error: statsError } = await client
        .from("user_stats")
        .select("current_streak")
        .eq("user_id", userId)
        .maybeSingle();

      if (statsError) {
        console.error("User Stats Fetch Error:", statsError);
      }

      if (!userStats) {
        console.log("Creating user_stats for:", userId);
        const { error: upsertError } = await client.from("user_stats").upsert(
          {
            user_id: userId,
            current_streak: 0
          },
          { onConflict: "user_id" }
        );

        if (upsertError) {
          console.error("user_stats upsert Error:", upsertError);
        }
        streak = 0;
      } else {
        streak = userStats.current_streak || 0;
      }

      if (!scores || scores.length === 0) {
        document.getElementById("scoreList").innerHTML = "<p>No score yet.</p>";
        totalMood = 0;
        animateNumber("coinTotal", 0, 600);
        animateNumber("streakTotal", streak, 600);
        animateNumber("moodTotal", totalMood, 600);
        document.getElementById("total").style.opacity = 1;
        return;
      }

      const list = document.getElementById("scoreList");
      list.innerHTML = "";
      totalCoins = 0;
      totalMood = 0;

      rowsLoop(scores, list);

      document.getElementById("coinTotal").textContent = "0";
      document.getElementById("streakTotal").textContent = "0";
      document.getElementById("moodTotal").textContent = "0";

      revealRows(scores.length);
      buildShare(scores, totalCoins, streak, totalMood);
    }

    function rowsLoop(scores, list) {
      scores.forEach((s) => {
        const forecasted = hasForecast(s);

        if (forecasted) {
          totalCoins += Number(s.coins || 0);
          totalMood += Number(s.mood || 0); // uses daily_scores.mood
        }

        const icon = resultCircle(s);
        const detailHtml = forecasted
          ? `
            My Forecasts: H ${formatTemp(s.forecast_high)}° / L ${formatTemp(s.forecast_low)}°
            <br />
            Actual Temps: H ${formatTemp(s.actual_high)}° / L ${formatTemp(s.actual_low)}°
            <br />
            Accuracy: H ${formatTemp(s.error_high)}° / L ${formatTemp(s.error_low)}° Error
          `
          : `No forecasts submitted for yesterday`;

        const coinText = forecasted ? `🪙 +${Number(s.coins || 0)}` : `🪙 +0`;
        const moodText = forecasted ? `${formatMood(s.mood)}` : "—";

        const row = document.createElement("div");
        row.className = forecasted ? "score-row" : "score-row missing";
        row.innerHTML = `
          <div class="city">${icon} ${cityDisplay(s)}</div>
          <div class="msg">${s.message || (forecasted ? "" : "No submission")}</div>
          <div class="detail">${detailHtml}</div>
          <div class="coin">${coinText}</div>
          <div class="mood">💗 ${moodText}</div>
        `;
        list.appendChild(row);
      });
    }

    function revealRows(rowCount) {
      const rows = document.querySelectorAll(".score-row");

      rows.forEach((row, i) => {
        setTimeout(() => {
          row.classList.add("visible");
        }, i * 300);
      });

      setTimeout(() => {
        animateNumber("coinTotal", totalCoins, 600);
        animateNumber("streakTotal", streak, 600);
        animateNumber("moodTotal", totalMood, 600);
      }, rowCount * 300);

      setTimeout(() => {
        document.getElementById("total").style.opacity = 1;
      }, rowCount * 600);
    }

    function showShareStatus(msg, type = "ok") {
      let status = document.getElementById("shareStatus");
      if (!status) {
        status = document.createElement("div");
        status.id = "shareStatus";
        status.style.marginTop = "8px";
        status.style.fontSize = "13px";
        status.style.minHeight = "18px";
        document.getElementById("shareBtn").insertAdjacentElement("afterend", status);
      }
      status.style.color = type === "error" ? "#b91c1c" : "#166534";
      status.textContent = msg;
      clearTimeout(window.__shareTimer);
      window.__shareTimer = setTimeout(() => (status.textContent = ""), 2000);
    }

    function showManualShareFallback(text) {
      let box = document.getElementById("manualShareBox");
      if (!box) {
        box = document.createElement("textarea");
        box.id = "manualShareBox";
        box.setAttribute("readonly", "");
        box.style.width = "100%";
        box.style.minHeight = "110px";
        box.style.marginTop = "10px";
        box.style.padding = "8px";
        box.style.fontFamily = "inherit";
        box.style.fontSize = "14px";
        document.getElementById("shareBtn").insertAdjacentElement("afterend", box);
      }
      box.value = text;
      box.style.display = "block";
      box.focus();
      box.select();
    }

    async function copyText(text) {
      if (window.isSecureContext && navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (e) {
          console.warn("Clipboard API failed:", e);
        }
      }

      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        if (ok) return true;
      } catch (e) {
        console.warn("execCommand fallback failed:", e);
      }

      return false;
    }

    function buildShare(scores, totalCoins, streak, totalMood) {
      const btn = document.getElementById("shareBtn");

      btn.onclick = async () => {
        const orderedCityIds = Object.keys(CITY_BY_ID)
          .map((id) => Number(id))
          .sort((a, b) => a - b);

        const circles = orderedCityIds
          .map((id) => {
            const row = scores.find((r) => Number(r.city_id) === id);
            return resultCircle(row || {});
          })
          .join(" ");

        const gameDate = new Date(Date.now() - 86400000).toLocaleDateString("en-US", {
          month: "short",
          day: "numeric"
        });

        const text =
          `Temps with Friends — ${gameDate}\n${circles}\n🪙 ${totalCoins}\n💗 ${totalMood}\n⭐ ${streak}`;

        const ok = await copyText(text);
        if (ok) {
          showShareStatus("✅ Score copied!");
        } else {
          showShareStatus("⚠️ Clipboard is blocked here. Use text box below.", "error");
          showManualShareFallback(text);
        }
      };
    }

    loadScore();
  </script>
</body>
</html>
